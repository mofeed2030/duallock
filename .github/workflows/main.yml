name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Extract and Clean Project
        run: |
          # 1. فك ضغط الملف
          unzip "duallock_project (1).zip" -d temp_folder
          cp -r temp_folder/duallock/* . || cp -r temp_folder/* . || true
          
          # 2. تنظيف ملف pubspec.yaml من التكرارات والمكتبات المتعارضة
          # سنحذف المكتبات تماماً ثم نعيد إضافتها مرة واحدة فقط لضمان عدم التكرار
          sed -i '/firebase/d' pubspec.yaml
          sed -i '/cloud_firestore/d' pubspec.yaml
          sed -i '/google_fonts/d' pubspec.yaml
          sed -i '/crypto/d' pubspec.yaml
          sed -i '/shared_preferences/d' pubspec.yaml
          sed -i '/flutter_secure_storage/d' pubspec.yaml
          
          # 3. إضافة المكتبات المطلوبة بشكل نظيف تحت قسم dependencies
          sed -i '/dependencies:/a \  crypto: ^3.0.3\n  shared_preferences: ^2.2.2\n  google_fonts: ^6.1.0\n  flutter_secure_storage: ^9.0.0' pubspec.yaml

          # 4. إنشاء مجلدات الوسائط
          mkdir -p assets/images assets/animations assets/icons lib/widgets lib/services

      - name: Fix Android Embedding
        run: |
          find android -name "AndroidManifest.xml" -exec sed -i '/<activity/a \            <meta-data android:name="flutterEmbedding" android:value="2" />' {} +

      - name: Install Dependencies
        run: |
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualLock-Final-App
          path: build/app/outputs/flutter-apk/app-release.apk
