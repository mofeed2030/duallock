name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create new Flutter project
        run: |
          flutter create --org com.duallock --project-name duallock_app newproject
          cp -r newproject/android ./android
          cp -r newproject/ios ./ios || true

      - name: Unzip and copy lib files
        run: |
          unzip "duallock_project (1).zip" -d extracted
          cp -r extracted/duallock/lib ./lib
          cp extracted/duallock/pubspec.yaml ./pubspec.yaml

      - name: Create missing files and folders
        run: |
          mkdir -p assets/images assets/animations assets/icons assets/fonts
          mkdir -p lib/widgets
          cat > lib/widgets/gradient_button.dart << 'EOF'
import 'package:flutter/material.dart';
class GradientButton extends StatelessWidget {
  final VoidCallback onPressed;
  final String text;
  final IconData? icon;
  final double? width;
  final double height;
  final List<Color>? colors;
  const GradientButton({super.key, required this.onPressed, required this.text, this.icon, this.width, this.height = 56, this.colors});
  @override
  Widget build(BuildContext context) {
    final gc = colors ?? [const Color(0xFF2979FF), const Color(0xFF448AFF)];
    return GestureDetector(
      onTap: onPressed,
      child: Container(
        width: width ?? double.infinity,
        height: height,
        decoration: BoxDecoration(
          gradient: LinearGradient(colors: gc),
          borderRadius: BorderRadius.circular(16),
        ),
        child: Row(
          mainAxisAlignment: MainAxisAlignment.center,
          children: [
            Text(text, style: const TextStyle(color: Colors.white, fontSize: 16, fontWeight: FontWeight.bold)),
            if (icon != null) ...[const SizedBox(width: 8), Icon(icon, color: Colors.white, size: 20)],
          ],
        ),
      ),
    );
  }
}
EOF

      - name: Fix pubspec
        run: |
          sed -i '/firebase_core/d' pubspec.yaml
          sed -i '/firebase_auth/d' pubspec.yaml
          sed -i '/cloud_firestore/d' pubspec.yaml
          sed -i '/device_apps/d' pubspec.yaml
          sed -i '/installed_apps/d' pubspec.yaml
          sed -i '/local_auth/d' pubspec.yaml
          sed -i '/photo_manager/d' pubspec.yaml
          sed -i '/flutter_secure_storage/d' pubspec.yaml
          sed -i 's/name: duallock/name: duallock_app/' pubspec.yaml
          sed -i '/assets\/images/d' pubspec.yaml
          sed -i '/assets\/animations/d' pubspec.yaml
          sed -i '/assets\/icons/d' pubspec.yaml
          sed -i '/Cairo-Regular/d' pubspec.yaml
          sed -i '/Cairo-Bold/d' pubspec.yaml
          sed -i '/Cairo-SemiBold/d' pubspec.yaml

      - name: Fix security service
        run: |
          cat > lib/services/security_service.dart << 'EOF'
import 'dart:convert';
import 'package:crypto/crypto.dart';
import 'package:shared_preferences/shared_preferences.dart';
class SecurityService {
  static final SecurityService _instance = SecurityService._internal();
  factory SecurityService() => _instance;
  SecurityService._internal();
  static const String _salt = 'DualLock_S3cur3_S@lt_2024';
  String hashPattern(String pattern) {
    final bytes = utf8.encode('$_salt:$pattern:$_salt');
    return sha256.convert(bytes).toString();
  }
  Future<void> saveRealPattern(String p) async {
    final prefs = await SharedPreferences.getInstance();
    await prefs.setString('real_pattern', hashPattern(p));
  }
  Future<void> saveDecoyPattern(String p) async {
    final prefs = await SharedPreferences.getInstance();
    await prefs.setString('decoy_pattern', hashPattern(p));
  }
  Future<bool> verifyRealPattern(String p) async {
    final prefs = await SharedPreferences.getInstance();
    return prefs.getString('real_pattern') == hashPattern(p);
  }
  Future<bool> verifyDecoyPattern(String p) async {
    final prefs = await SharedPreferences.getInstance();
    return prefs.getString('decoy_pattern') == hashPattern(p);
  }
  Future<PatternType> checkPattern(String p) async {
    if (await verifyRealPattern(p)) return PatternType.real;
    if (await verifyDecoyPattern(p)) return PatternType.decoy;
    return PatternType.invalid;
  }
  Future<bool> hasRealPattern() async {
    final prefs = await SharedPreferences.getInstance();
    return prefs.getString('real_pattern') != null;
  }
  Future<bool> hasDecoyPattern() async {
    final prefs = await SharedPreferences.getInstance();
    return prefs.getString('decoy_pattern') != null;
  }
}
enum PatternType { real, decoy, invalid }
EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualLock-APK
          path: build/app/outputs/flutter-apk/app-release.apk
