name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Extract and Prep
        run: |
          # 1. فك ضغط الملف
          unzip "duallock_project (1).zip" -d temp_folder
          
          # 2. البحث عن مجلد المشروع (لأن أحياناً يكون داخل مجلد فرعي)
          # سنقوم بنقل كل الملفات للمسار الرئيسي
          cp -r temp_folder/duallock/* . || cp -r temp_folder/* . || true
          
          # 3. إنشاء المجلدات الناقصة لضمان عدم فشل البناء
          mkdir -p assets/images assets/animations assets/icons lib/widgets

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualLock-App
          path: build/app/outputs/flutter-apk/app-release.apk
