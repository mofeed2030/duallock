name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create Flutter project
        run: |
          flutter create --org com.duallock --project-name duallock_app newproject
          cp -r newproject/android ./android

      - name: Unzip project
        run: |
          unzip "duallock_project (1).zip" -d extracted
          cp -r extracted/duallock/lib ./lib
          cp extracted/duallock/pubspec.yaml ./pubspec.yaml

      - name: Create assets
        run: mkdir -p assets/images assets/animations assets/icons assets/fonts lib/widgets

      - name: Fix pubspec
        run: |
          sed -i '/firebase/d' pubspec.yaml
          sed -i '/device_apps/d' pubspec.yaml
          sed -i '/installed_apps/d' pubspec.yaml
          sed -i '/local_auth/d' pubspec.yaml
          sed -i '/photo_manager/d' pubspec.yaml
          sed -i '/flutter_secure_storage/d' pubspec.yaml
          sed -i '/assets\/images/d' pubspec.yaml
          sed -i '/assets\/animations/d' pubspec.yaml
          sed -i '/assets\/icons/d' pubspec.yaml
          sed -i '/Cairo/d' pubspec.yaml
          sed -i '/family:/d' pubspec.yaml
          sed -i '/weight:/d' pubspec.yaml
          sed -i 's/name: duallock$/name: duallock_app/' pubspec.yaml

      - name: Write gradient button
        run: python3 -c "
import os
os.makedirs('lib/widgets', exist_ok=True)
code = '''import \"package:flutter/material.dart\";
class GradientButton extends StatelessWidget {
  final VoidCallback onPressed;
  final String text;
  final IconData? icon;
  final double height;
  const GradientButton({super.key, required this.onPressed, required this.text, this.icon, this.height = 56});
  @override
  Widget build(BuildContext context) {
    return GestureDetector(
      onTap: onPressed,
      child: Container(
        width: double.infinity,
        height: height,
        decoration: BoxDecoration(gradient: LinearGradient(colors: [Color(0xFF2979FF), Color(0xFF448AFF)]), borderRadius: BorderRadius.circular(16)),
        child: Row(mainAxisAlignment: MainAxisAlignment.center, children: [
          Text(text, style: TextStyle(color: Colors.white, fontSize: 16, fontWeight: FontWeight.bold)),
          if (icon != null) ...[SizedBox(width: 8), Icon(icon, color: Colors.white, size: 20)],
        ]),
      ),
    );
  }
}'''
open('lib/widgets/gradient_button.dart', 'w').write(code)
"

      - name: Write security service
        run: python3 -c "
import os
code = '''import \"dart:convert\";
import \"package:crypto/crypto.dart\";
import \"package:shared_preferences/shared_preferences.dart\";
class SecurityService {
  static final SecurityService _i = SecurityService._();
  factory SecurityService() => _i;
  SecurityService._();
  static const _s = \"DualLock_Salt_2024\";
  String hash(String p) => sha256.convert(utf8.encode(\"\$_s:\$p:\$_s\")).toString();
  Future<void> saveRealPattern(String p) async => (await SharedPreferences.getInstance()).setString(\"real\", hash(p));
  Future<void> saveDecoyPattern(String p) async => (await SharedPreferences.getInstance()).setString(\"decoy\", hash(p));
  Future<bool> verifyRealPattern(String p) async => (await SharedPreferences.getInstance()).getString(\"real\") == hash(p);
  Future<bool> verifyDecoyPattern(String p) async => (await SharedPreferences.getInstance()).getString(\"decoy\") == hash(p);
  Future<PatternType> checkPattern(String p) async {
    if (await verifyRealPattern(p)) return PatternType.real;
    if (await verifyDecoyPattern(p)) return PatternType.decoy;
    return PatternType.invalid;
  }
  Future<bool> hasRealPattern() async => (await SharedPreferences.getInstance()).getString(\"real\") != null;
  Future<bool> hasDecoyPattern() async => (await SharedPreferences.getInstance()).getString(\"decoy\") != null;
}
enum PatternType { real, decoy, invalid }'''
open('lib/services/security_service.dart', 'w').write(code)
"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualLock-APK
          path: build/app/outputs/flutter-apk/app-release.apk
