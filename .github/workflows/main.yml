name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip "duallock_project (1).zip" -d extracted && cp -r extracted/duallock/. .

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Fix pubspec
        run: |
          sed -i '/firebase_core/d' pubspec.yaml
          sed -i '/firebase_auth/d' pubspec.yaml
          sed -i '/cloud_firestore/d' pubspec.yaml
          sed -i '/device_apps/d' pubspec.yaml
          sed -i '/installed_apps/d' pubspec.yaml
          sed -i '/local_auth/d' pubspec.yaml
          sed -i '/photo_manager/d' pubspec.yaml
          sed -i '/flutter_secure_storage/d' pubspec.yaml

      - name: Fix Android MainActivity
        run: |
          mkdir -p android/app/src/main/java/com/duallock/app
          printf 'package com.duallock.app\nimport io.flutter.embedding.android.FlutterActivity\nclass MainActivity: FlutterActivity()' > android/app/src/main/java/com/duallock/app/MainActivity.kt

      - name: Fix AndroidManifest
        run: |
          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET"/>\n<application android:label="DualLock" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">\n<activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">\n<meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>\n<intent-filter>\n<action android:name="android.intent.action.MAIN"/>\n<category android:name="android.intent.category.LAUNCHER"/>\n</intent-filter>\n</activity>\n<meta-data android:name="flutterEmbedding" android:value="2"/>\n</application>\n</manifest>' > android/app/src/main/AndroidManifest.xml

      - name: Fix app build.gradle
        run: |
          printf 'plugins {\n    id "com.android.application"\n    id "kotlin-android"\n    id "dev.flutter.flutter-gradle-plugin"\n}\nandroid {\n    namespace "com.duallock.app"\n    compileSdk 34\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }\n    kotlinOptions { jvmTarget = "17" }\n    defaultConfig {\n        applicationId "com.duallock.app"\n        minSdkVersion 26\n        targetSdkVersion 34\n        versionCode 1\n        versionName "1.0"\n    }\n    buildTypes {\n        release { signingConfig signingConfigs.debug }\n    }\n}\nflutter { source "../.." }' > android/app/build.gradle

      - name: Fix root build.gradle
        run: |
          printf 'buildscript {\n    ext.kotlin_version = "1.9.0"\n    repositories { google()\n        mavenCentral() }\n    dependencies {\n        classpath "com.android.tools.build:gradle:8.1.0"\n        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"\n    }\n}\nallprojects { repositories { google()\n    mavenCentral() } }' > android/build.gradle

      - name: Fix settings.gradle
        run: |
          printf 'include ":app"\n\ndef localPropertiesFile = new File(rootProject.projectDir, "local.properties")\ndef properties = new Properties()\n\nassert localPropertiesFile.exists()\nlocalPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }\n\ndef flutterSdkPath = properties.getProperty("flutter.sdk")\nassert flutterSdkPath != null, "flutter.sdk not set in local.properties"\napply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"' > android/settings.gradle

      - name: Fix gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists' > android/gradle/wrapper/gradle-wrapper.properties

      - name: Fix gradle properties
        run: |
          printf 'org.gradle.jvmargs=-Xmx4G\nandroid.useAndroidX=true\nandroid.enableJetifier=true' > android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DualLock-APK
          path: build/app/outputs/flutter-apk/app-release.apk
